name: "Validate PR Title"
description: "Enforce Conventional Commits format on PR titles"

runs:
  using: "composite"
  steps:
    - uses: amannn/action-semantic-pull-request@v6
      env:
        GITHUB_TOKEN: ${{ github.token }}
      with:
        types: |
          feat
          fix
          perf
          refactor
          docs
          test
          ci
          chore
          build
          style
          revert
        requireScope: false
        subjectPattern: ^.+$
        subjectPatternError: "PR title must have a description after the type prefix."
