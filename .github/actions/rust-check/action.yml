name: "Rust Check, Lint & Test"
description: "Format check, clippy, and tests with parallel execution"

inputs:
  github-app-id:
    description: "GitHub App ID for private repo access"
    required: true
  github-app-pem:
    description: "GitHub App PEM private key"
    required: true

runs:
  using: "composite"
  steps:
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ inputs.github-app-id }}
        private-key: ${{ inputs.github-app-pem }}
        owner: Pulsar-Anvil-Studios

    - name: Configure git for private deps
      shell: bash
      run: |
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Install cargo-nextest
      uses: taiki-e/install-action@nextest

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        cache-targets: true
        cache-all-crates: true

    - name: Check formatting
      shell: bash
      run: cargo fmt --all -- --check

    - name: Clippy
      shell: bash
      env:
        CARGO_TERM_COLOR: always
        CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        RUSTFLAGS: "-C debuginfo=0 -C codegen-units=16"
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Run tests
      shell: bash
      env:
        CARGO_TERM_COLOR: always
        CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        RUSTFLAGS: "-C debuginfo=0 -C codegen-units=16"
      run: cargo nextest run --profile ci

    - name: Show sccache stats
      if: '!cancelled()'
      shell: bash
      run: sccache --show-stats
