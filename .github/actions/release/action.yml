name: "Release"
description: "Conventional Commits release: changelog, version bump, tag, GitHub Release"

inputs:
  github-app-id:
    description: "GitHub App ID"
    required: true
  github-app-pem:
    description: "GitHub App PEM private key"
    required: true

runs:
  using: "composite"
  steps:
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ inputs.github-app-id }}
        private-key: ${{ inputs.github-app-pem }}
        owner: Pulsar-Anvil-Studios

    - name: Checkout (full history)
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ steps.app-token.outputs.token }}

    - name: Install git-cliff
      uses: taiki-e/install-action@v2
      with:
        tool: git-cliff

    - name: Detect version bump
      id: version
      shell: bash
      run: |
        LATEST_TAG=$(git tag -l "v*" --sort=-version:refname | head -1)

        if [ -z "$LATEST_TAG" ]; then
          REF_RANGE=$(git log --format=%H --reverse -- 'crates/' 'lambdas/' | head -1)
          [ -z "$REF_RANGE" ] && { echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0; }
          REF_RANGE="${REF_RANGE}^..HEAD"
          CURRENT_VERSION="0.0.0"
        else
          CHANGES=$(git diff --name-only "${LATEST_TAG}..HEAD" -- 'crates/' 'lambdas/')
          [ -z "$CHANGES" ] && { echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0; }
          REF_RANGE="${LATEST_TAG}..HEAD"
          CURRENT_VERSION="${LATEST_TAG#v}"
        fi

        BUMP="patch"
        while IFS= read -r MSG; do
          if echo "$MSG" | grep -qE '^[a-z]+(\(.+\))?!:' || echo "$MSG" | grep -q 'BREAKING CHANGE'; then
            BUMP="major"; break
          elif echo "$MSG" | grep -qE '^feat(\(.+\))?:'; then
            BUMP="minor"
          fi
        done < <(git log --format=%s $REF_RANGE)

        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
        case "$BUMP" in
          major) NEW_VERSION="$((MAJOR+1)).0.0" ;;
          minor) NEW_VERSION="${MAJOR}.$((MINOR+1)).0" ;;
          patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH+1))" ;;
        esac

        echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
        echo "skip=false" >> "$GITHUB_OUTPUT"

    - name: Generate changelog
      if: steps.version.outputs.skip != 'true'
      shell: bash
      run: git-cliff --tag "v${{ steps.version.outputs.version }}" -o CHANGELOG.md

    - name: Update workspace version
      if: steps.version.outputs.skip != 'true'
      shell: bash
      run: |
        sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" Cargo.toml
        cargo update -w

    - name: Commit, tag, push
      if: steps.version.outputs.skip != 'true'
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        git commit -m "chore(release): v${{ steps.version.outputs.version }} [skip ci]"
        git tag "v${{ steps.version.outputs.version }}"
        git push origin main --tags

    - name: Create GitHub Release
      if: steps.version.outputs.skip != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        gh release create "v${{ steps.version.outputs.version }}" \
          --title "v${{ steps.version.outputs.version }}" \
          --notes-file CHANGELOG.md
